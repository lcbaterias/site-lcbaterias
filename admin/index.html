<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Admin LC Baterias</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f1729 0%,#003D82 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-wrap{width:100%;max-width:420px}
    .login-brand{text-align:center;margin-bottom:28px}
    .login-brand img{height:48px;filter:brightness(0) invert(1)}
    .login-brand p{color:rgba(255,255,255,.5);font-size:12px;margin-top:8px;text-transform:uppercase;letter-spacing:1px;font-weight:600}
    .login-card{background:#fff;border-radius:20px;padding:36px;box-shadow:0 24px 60px rgba(0,0,0,.3)}
    .login-title{font-size:21px;font-weight:800;color:#0f1729;text-align:center;margin-bottom:4px}
    .login-sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:28px}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
    .form-group input{width:100%;padding:12px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;color:#0f1729}
    .form-group input:focus{border-color:#0057B8}
    .btn-login{width:100%;padding:13px;background:#0057B8;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-login:hover:not(:disabled){background:#003D82}
    .btn-login:disabled{background:#93c5fd;cursor:not-allowed}
    .login-err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:16px;display:none}
    .login-err.show{display:block}
    .login-footer{text-align:center;margin-top:22px}
    .login-footer a{color:rgba(255,255,255,.6);font-size:13px;text-decoration:none;font-weight:500}
    .login-footer a:hover{color:#fff}
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <img src="../assets/icons/logo.png" alt="LC Baterias">
      <p>Área Administrativa</p>
    </div>
    <div class="login-card">
      <h1 class="login-title">Bem-vindo de volta</h1>
      <p class="login-sub">Faça login para acessar o painel</p>
      <div class="login-err" id="login-err"></div>
      <form id="login-form">
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="f-email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="f-pass" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login" id="btn-login">
          <span id="btn-text">Entrar</span>
        </button>
      </form>
    </div>
    <div class="login-footer">
      <a href="../index.html">← Voltar ao site</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script>
    // Redireciona se já estiver logado
    db.auth.getSession().then(({ data: { session } }) => {
      if (session) location.href = 'dashboard.html';
    });

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn  = document.getElementById('btn-login');
      const text = document.getElementById('btn-text');
      const err  = document.getElementById('login-err');
      btn.disabled = true;
      text.innerHTML = '<span class="spinner"></span>';
      err.classList.remove('show');

      const { error } = await db.auth.signInWithPassword({
        email:    document.getElementById('f-email').value,
        password: document.getElementById('f-pass').value
      });

      if (error) {
        err.textContent = 'E-mail ou senha incorretos.';
        err.classList.add('show');
        btn.disabled = false;
        text.textContent = 'Entrar';
      } else {
        location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
